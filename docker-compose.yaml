services:
  db:
    image: mysql
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: database-exo
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backup:/backup/
      - ./sakila-db/sakila-schema.sql:/docker-entrypoint-initdb.d/01-sakila-schema.sql
      - ./sakila-db/sakila-data.sql:/docker-entrypoint-initdb.d/02-sakila-data.sql

  db2:
    image: gvenzl/oracle-free:latest
    container_name: oracle
    restart: always
    environment:
      ORACLE_PASSWORD: monpass
      APP_USER: etudiant
      APP_USER_PASSWORD: etudiant123
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata

volumes:
  mysql_data:
  oracle_data:

